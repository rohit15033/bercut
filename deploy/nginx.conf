# deploy/nginx.conf
# Bercut Barber Shop — Nginx reverse proxy config
# Serves the Vite SPA from backend/public, proxies /api to Node.js on :3000
#
# CRITICAL: proxy_buffering off is required for SSE — never remove.

server {
    listen 80;
    server_name _;                         # replace with your domain in production

    root /var/www/bercut/backend/public;   # Vite build output (build.outDir)
    index index.html;

    # ── Static assets — long cache ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SSE + API — must be buffering-off ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;

        proxy_buffering            off;    # CRITICAL — SSE breaks with buffering on
        proxy_cache                off;
        chunked_transfer_encoding  on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep SSE connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── SPA fallback — React Router ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
